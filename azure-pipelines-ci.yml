trigger: none
pr: none

variables:
  NodeVersion: '24.14.1'

stages:
  - stage: Validate
    displayName: Validate KiCad Studio
    jobs:
      - job: CrossPlatform
        displayName: Lint, build, and test
        strategy:
          matrix:
            linux:
              imageName: ubuntu-latest
            windows:
              imageName: windows-latest
            macos:
              imageName: macos-latest
        pool:
          vmImage: $(imageName)
        steps:
          - checkout: self
          - task: UseNode@1
            displayName: Use Node.js $(NodeVersion)
            inputs:
              version: $(NodeVersion)
          - script: npm install -g npm@11.13.0
            displayName: Pin npm toolchain
          - script: npm ci
            displayName: Install dependencies
          - script: npm run audit:ci
            displayName: Audit dependencies
          - script: npm run format:check
            displayName: Format check
          - script: npm run lint
            displayName: Lint
          - script: npm run typecheck
            displayName: Type check
          - script: npm run test:unit:coverage
            displayName: Unit tests
          - script: npm run build
            displayName: Build extension
          - script: npm test
            displayName: Integration tests
          - publish: coverage
            displayName: Publish coverage artifact
            artifact: coverage-$(Agent.OS)
            condition: succeededOrFailed()

      - job: Package
        displayName: Build VSIX artifact
        dependsOn: CrossPlatform
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - task: UseNode@1
            displayName: Use Node.js $(NodeVersion)
            inputs:
              version: $(NodeVersion)
          - script: npm install -g npm@11.13.0
            displayName: Pin npm toolchain
          - script: npm ci
            displayName: Install dependencies
          - script: npm run check:ci
            displayName: CI package gate
          - bash: |
              mkdir -p "$(Build.ArtifactStagingDirectory)"
              cp ./*.vsix "$(Build.ArtifactStagingDirectory)/"
            displayName: Stage VSIX artifact
          - publish: $(Build.ArtifactStagingDirectory)
            displayName: Publish VSIX artifact
            artifact: kicadstudio-vsix

      - job: RealServerIntegration
        displayName: Real kicad-mcp-pro integration
        dependsOn: CrossPlatform
        condition: and(succeeded(), ne(variables['SKIP_REAL_SERVER'], 'true'))
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - task: UseNode@1
            displayName: Use Node.js $(NodeVersion)
            inputs:
              version: $(NodeVersion)
          - script: |
              curl -LsSf https://astral.sh/uv/install.sh | sh
              echo "##vso[task.prependpath]$HOME/.local/bin"
            displayName: Install uv
          - script: npm install -g npm@11.13.0
            displayName: Pin npm toolchain
          - script: npm ci
            displayName: Install dependencies
          - script: npm run test:integration:real
            displayName: Real MCP integration tests
