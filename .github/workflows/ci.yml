name: KiCad Studio CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint-build-test:
    name: Lint, Build, Test, Package
    if: github.repository_owner == 'oaslananka-lab' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: CI routing notice
        shell: bash
        run: |
          if [ "${{ github.repository_owner }}" = "oaslananka-lab" ]; then
            echo "Running primary GitHub Actions CI from the oaslananka-lab organization repository."
          else
            echo "Running manual fallback CI from the personal mirror. Automatic CI/CD is owned by oaslananka-lab."
          fi
      - run: npm ci
      - run: npm run lint
      - run: npx tsc -p tsconfig.json --noEmit
      - run: npm run test:unit -- --coverage
      - run: npm run build
      - run: npm run package
      - run: npm run check:bundle-size
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: coverage/
