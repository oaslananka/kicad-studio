name: KiCad Studio CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint-build-test:
    name: Lint, Build, Test, Package
    if: github.repository_owner == 'oaslananka-lab' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          package-manager-cache: false
      - name: CI routing notice
        shell: bash
        run: |
          if [ "${{ github.repository_owner }}" = "oaslananka-lab" ]; then
            echo "Running primary GitHub Actions CI from the oaslananka-lab organization repository."
          else
            echo "Running manual fallback CI from the personal mirror. Automatic CI/CD is owned by oaslananka-lab."
          fi
      - run: npm install -g npm@11.13.0
      - run: npm ci
      - run: npm run check:ci
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}
          path: coverage/

  integration-real-server:
    name: Real kicad-mcp-pro integration
    if: >-
      (github.repository_owner == 'oaslananka-lab' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      SKIP_REAL_SERVER: ${{ secrets.SKIP_REAL_SERVER }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          package-manager-cache: false
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - run: npm install -g npm@11.13.0
      - run: npm ci
      - run: npm run test:integration:real
